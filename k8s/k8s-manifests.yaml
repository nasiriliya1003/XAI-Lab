# =============================================================================
#  XAI-Lab Kubernetes Manifests
#  Apply with:  kubectl apply -f k8s-manifests.yaml
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# 1.  Shared PersistentVolumeClaim  (both trainers write, both backends read)
#     Using ReadWriteMany so all pods can mount simultaneously.
#     Change storageClassName if your cluster uses a different provisioner.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-pvc
spec:
  accessModes:
    - ReadWriteMany           # required: trainers + backends mount at the same time
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard  # change to "hostpath" (Docker Desktop) or "efs-sc" (AWS) as needed

---
# ─────────────────────────────────────────────────────────────────────────────
# 2a. CronJob – trains model on credit_dataset1.csv  every 2 minutes
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: credit-trainer-dataset-1
spec:
  schedule: "*/2 * * * *"        # every 2 minutes
  concurrencyPolicy: Forbid      # skip if previous run still active
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600   # clean up Job 10 min after finish
      template:
        metadata:
          labels:
            app: credit-trainer
            dataset: "1"
        spec:
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 30
          containers:
          - name: credit-trainer
            # TODO: replace with your Docker Hub image
            # e.g.  image: yourdockerhubuser/xai-credit-trainer:latest
            image: nasiriliya1003/xai-credit-trainer:latest
            env:
            - name: DATASET_ID
              value: "1"
            - name: SHARED_VOLUME
              value: /shared-volume
            volumeMounts:
            - name: model-volume
              mountPath: /shared-volume
          volumes:
          - name: model-volume
            persistentVolumeClaim:
              claimName: model-pvc

---
# ─────────────────────────────────────────────────────────────────────────────
# 2b. CronJob – trains model on credit_dataset2.csv  every 2 minutes
#     Offset by 1 minute so the two jobs don't race on the PVC.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: credit-trainer-dataset-2
spec:
  schedule: "1-59/2 * * * *"    # offset by 1 minute (1,3,5,7,… )
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app: credit-trainer
            dataset: "2"
        spec:
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 30
          containers:
          - name: credit-trainer
            image: nasiriliya1003/xai-credit-trainer:latest
            env:
            - name: DATASET_ID
              value: "2"
            - name: SHARED_VOLUME
              value: /shared-volume
            volumeMounts:
            - name: model-volume
              mountPath: /shared-volume
          volumes:
          - name: model-volume
            persistentVolumeClaim:
              claimName: model-pvc

---
# ─────────────────────────────────────────────────────────────────────────────
# 3a. Backend Deployment – serves model trained on dataset 1
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-backend-deployment-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: credit-backend
      dataset: "1"
  template:
    metadata:
      labels:
        app: credit-backend
        dataset: "1"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: credit-backend
        image: nasiriliya1003/xai-credit-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATASET_ID
          value: "1"
        - name: SHARED_VOLUME
          value: /shared-volume
        - name: MODEL_RELOAD_SECS
          value: "30"
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]   # drain connections before SIGTERM
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
        volumeMounts:
        - name: model-volume
          mountPath: /shared-volume
          readOnly: true
      volumes:
      - name: model-volume
        persistentVolumeClaim:
          claimName: model-pvc

---
# ─────────────────────────────────────────────────────────────────────────────
# 3b. ClusterIP Service for backend-1  (load balancer talks to this)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: credit-backend-service-1
spec:
  type: ClusterIP
  selector:
    app: credit-backend
    dataset: "1"
  ports:
  - port: 8000
    targetPort: 8000

---
# ─────────────────────────────────────────────────────────────────────────────
# 4a. Backend Deployment – serves model trained on dataset 2
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-backend-deployment-2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: credit-backend
      dataset: "2"
  template:
    metadata:
      labels:
        app: credit-backend
        dataset: "2"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: credit-backend
        image: nasiriliya1003/xai-credit-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATASET_ID
          value: "2"
        - name: SHARED_VOLUME
          value: /shared-volume
        - name: MODEL_RELOAD_SECS
          value: "30"
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
        volumeMounts:
        - name: model-volume
          mountPath: /shared-volume
          readOnly: true
      volumes:
      - name: model-volume
        persistentVolumeClaim:
          claimName: model-pvc

---
# ─────────────────────────────────────────────────────────────────────────────
# 4b. ClusterIP Service for backend-2
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: credit-backend-service-2
spec:
  type: ClusterIP
  selector:
    app: credit-backend
    dataset: "2"
  ports:
  - port: 8000
    targetPort: 8000

---
# ─────────────────────────────────────────────────────────────────────────────
# 5a. Load-Balancer Deployment
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-load-balancer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: credit-load-balancer
  template:
    metadata:
      labels:
        app: credit-load-balancer
    spec:
      containers:
      - name: credit-load-balancer
        image: nasiriliya1003/xai-credit-loadbalancer:latest
        ports:
        - containerPort: 8080
        env:
        # These match the ClusterIP service names defined above
        - name: BACKEND_1_URL
          value: "http://credit-backend-service-1:8000"
        - name: BACKEND_2_URL
          value: "http://credit-backend-service-2:8000"
        - name: PORT
          value: "8080"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

---
# ─────────────────────────────────────────────────────────────────────────────
# 5b. NodePort Service – exposes load balancer externally on port 30080
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: credit-load-balancer-service
spec:
  type: NodePort
  selector:
    app: credit-load-balancer
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    nodePort: 30080

---
# ─────────────────────────────────────────────────────────────────────────────
# 6. HorizontalPodAutoscaler – auto-scale backends under load
#    Requires metrics-server to be running in the cluster.
#    Install with: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: credit-backend-hpa-1
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: credit-backend-deployment-1
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: credit-backend-hpa-2
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: credit-backend-deployment-2
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
